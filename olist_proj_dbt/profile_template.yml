fixed:
  type: sqlserver
  driver: 'ODBC Driver 18 for SQL Server'
  port: 1433
  schema: dbo
  authentication: CLI
  threads: 4
  retries: 5

prompts:
  server:
    hint: "the AZURE_SQL_SERVER value, e.g. yourserver.database.windows.net"
    type: string
  database:
    hint: "the AZURE_SQL_DATABASE value"
    type: string
